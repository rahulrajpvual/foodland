<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <title>RepoGen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="toast" class="toast"></div>

  <div class="shell" id="shell">

    <!-- ══════════════════
         SCREEN 1 — FORM
    ══════════════════════ -->
    <div class="screen" id="screen-form">

      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-dot"></div>
          <span class="topbar-name">RepoGen</span>
        </div>
        <span class="topbar-date" id="topbar-date"></span>
      </div>

      <div class="form-wrap">
        <form id="reportForm" novalidate>

          <!-- ── General ── -->
          <div class="block">
            <p class="block-lbl">General</p>
            <div class="grid-2">
              <div class="field">
                <label class="lbl" for="f-date">Date <span class="req">*</span></label>
                <input class="inp" type="date" id="f-date" name="date" required />
              </div>
              <div class="field">
                <label class="lbl" for="f-shop">Shop <span class="req">*</span></label>
                <div class="sel-wrap">
                  <select class="inp sel" id="f-shop" name="shop" required>
                    <option value="">— select —</option>
                    <option value="Kent">Kent</option>
                    <option value="Redhill">Redhill</option>
                    <option value="Cheam">Cheam</option>
                    <option value="East Grinstead">East Grinstead</option>
                  </select>
                  <svg class="sel-arr" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="4 6 8 10 12 6"/></svg>
                </div>
              </div>
            </div>
          </div>

          <div class="hr"></div>

          <!-- ── Opening Balance ── -->
          <div class="block">
            <p class="block-lbl">Balance</p>
            <div class="grid-1">
              <div class="field">
                <label class="lbl" for="f-opening">Opening Balance <span class="req">*</span></label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-opening" name="openingBalance" placeholder="0.00" step="0.01" inputmode="decimal" required />
                </div>
              </div>
            </div>
          </div>

          <div class="hr"></div>

          <!-- ── Sales ── -->
          <div class="block">
            <p class="block-lbl">Sales</p>
            <div class="grid-2">
              <div class="field">
                <label class="lbl" for="f-cash-sale">Cash Sale <span class="req">*</span></label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-cash-sale" name="cashSale" placeholder="0.00" step="0.01" inputmode="decimal" required />
                </div>
              </div>
              <div class="field">
                <label class="lbl" for="f-card-sale">Card Sale <span class="req">*</span></label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-card-sale" name="cardSale" placeholder="0.00" step="0.01" inputmode="decimal" required />
                </div>
              </div>
              <div class="field">
                <label class="lbl" for="f-bank-tx">Bank Transfer</label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-bank-tx" name="bankTransfer" placeholder="0.00" step="0.01" inputmode="decimal" />
                </div>
              </div>
              <div class="field">
                <label class="lbl" for="f-total-sale">Total Sale <span class="req">*</span></label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-total-sale" name="totalSale" placeholder="0.00" step="0.01" inputmode="decimal" required />
                </div>
              </div>
            </div>
          </div>

          <div class="hr"></div>

          <!-- ── Cash Details ── -->
          <div class="block">
            <p class="block-lbl">Cash Details</p>
            <div class="grid-2">

              <div class="field">
                <label class="lbl" for="f-variance">Variance</label>
                <div class="inp-wrap inp-wrap--signed">
                  <button type="button" id="variance-sign" class="sign-toggle sign-neg" title="Toggle sign">−</button>
                  <input class="inp inp-n inp-signed" type="number" id="f-variance" name="variance" placeholder="0.00" step="0.01" inputmode="decimal" />
                </div>
              </div>

              <div class="field">
                <label class="lbl" for="f-boc">BOC <span class="req">*</span></label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-boc" name="boc" placeholder="0.00" step="0.01" inputmode="decimal" required />
                </div>
              </div>

              <div class="field grid-span-2">
                <label class="lbl" for="f-cash-out">Cash Out</label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-cash-out" name="cashOut" placeholder="0.00" step="0.01" inputmode="decimal" />
                </div>
              </div>

            </div>
          </div>

          <div class="hr"></div>

          <!-- ── Cash With (dynamic, dropdown names) ── -->
          <div class="block">
            <div class="block-header">
              <p class="block-lbl">Cash With</p>
              <button type="button" id="btn-add-cw" class="btn-add">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
                Add
              </button>
            </div>
            <div id="cw-list" class="dyn-list"></div>
          </div>

          <div class="hr"></div>

          <!-- ── Closing ── -->
          <div class="block">
            <p class="block-lbl">Closing</p>
            <div class="grid-2">
              <div class="field">
                <label class="lbl" for="f-paypoint">PayPoint</label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-paypoint" name="paypoint" placeholder="0.00" step="0.01" inputmode="decimal" />
                </div>
              </div>
              <div class="field">
                <label class="lbl" for="f-dojo">Dojo</label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-dojo" name="dojo" placeholder="0.00" step="0.01" inputmode="decimal" />
                </div>
              </div>
              <div class="field">
                <label class="lbl" for="f-closing">Closing Cash <span class="req">*</span></label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-closing" name="closingCash" placeholder="0.00" step="0.01" inputmode="decimal" required />
                </div>
              </div>
              <div class="field">
                <label class="lbl" for="f-unaccounted">Unaccounted Cash</label>
                <div class="inp-wrap"><span class="pfx">£</span>
                  <input class="inp inp-n" type="number" id="f-unaccounted" name="unaccountedCash" placeholder="0.00" step="0.01" inputmode="decimal" />
                </div>
              </div>
            </div>
          </div>

          <div class="hr"></div>

          <!-- ── Extras (dynamic) ── -->
          <div class="block">
            <div class="block-header">
              <p class="block-lbl">Extras <span class="optional-tag">optional</span></p>
              <button type="button" id="btn-add-extra" class="btn-add">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
                Add
              </button>
            </div>
            <div id="extra-list" class="dyn-list"></div>
            <p class="dyn-empty" id="extra-empty">No extras added yet.</p>
          </div>

          <div class="hr"></div>

          <!-- ── Invoice (optional) ── -->
          <div class="block">
            <p class="block-lbl">Invoice <span class="optional-tag">optional</span></p>
            <div class="grid-1">
              <div class="field">
                <label class="lbl" for="f-invoice">Invoice Amount (Rs)</label>
                <div class="inp-wrap"><span class="pfx pfx-rs">₹</span>
                  <input class="inp inp-n inp-invoice" type="number" id="f-invoice" name="invoiceRs" placeholder="0.00" step="0.01" inputmode="decimal" />
                </div>
              </div>
            </div>
          </div>

          <!-- ── Actions ── -->
          <div class="form-actions">
            <button type="button" id="btn-generate" class="btn btn-generate">Generate Report</button>
            <button type="button" id="btn-clear" class="btn btn-clear">Clear</button>
          </div>

        </form>
      </div>
    </div><!-- /#screen-form -->


    <!-- ══════════════════
         SCREEN 2 — OUTPUT
    ══════════════════════ -->
    <div class="screen screen-out" id="screen-out" aria-hidden="true">

      <div class="out-bar">
        <button class="back-btn" id="btn-back" type="button">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="16" y1="10" x2="4" y2="10"/><polyline points="9 5 4 10 9 15"/></svg>
          Edit
        </button>
        <span class="out-bar-title">RepoGen</span>
        <button class="out-copy-quick" id="btn-copy-top" type="button">Copy</button>
      </div>

      <div class="out-wrap">
        <div class="out-pills" id="out-pills"></div>

        <div class="out-box">
          <div class="out-box-head">
            <span class="out-box-label">WhatsApp Ready</span>
            <span class="out-box-hint">Tap to edit</span>
          </div>
          <textarea id="report-ta" class="report-ta" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
        </div>

        <div class="out-actions">
          <button type="button" id="btn-copy-main" class="btn btn-copy">Copy to Clipboard</button>
          <button type="button" id="btn-regen" class="btn btn-regen">Refresh</button>
        </div>
      </div>

    </div><!-- /#screen-out -->

  </div><!-- /.shell -->

  <script src="script.js"></script>
</body>
</html>
